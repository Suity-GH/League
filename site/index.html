<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Leagues Leaderboard</title>
  <meta name="description" content="OSRS / RS3 / Combined Leagues leaderboard with global player search." />
  <link rel="stylesheet" href="/style.css">
</head>

<body>
  <div class="container">
    <header>
      <a class="brand" href="/">
        <div class="title">Leagues Leaderboard</div>
        <div class="tag">OSRS • RS3 • Combined</div>
      </a>

      <nav class="navlinks">
        <a href="/" class="navitem navitem-active">Leaderboards</a>
        <a href="/stats.html" class="navitem">Stats</a>

        <div class="dropdown">
          <button class="dropbtn">Info ▾</button>
          <div class="dropdown-content">
            <a href="/relics.html">Relics</a>
            <a href="/areas.html">Areas</a>
          </div>
        </div>

        <a href="/about.html" class="navitem">About</a>
      </nav>
    </header>

    <section class="hero">
      <h1>Leaderboard + global player search</h1>
      <p>
        Use the tabs for top players, or search any player ever. Clicking a player opens their breakdown.
      </p>
    </section>

    <section class="panel">
      <div class="tabs" aria-label="Leaderboard tabs">
        <button data-tab="osrs" type="button">OSRS</button>
        <button data-tab="rs3" type="button">RS3</button>
        <button data-tab="combined" type="button">Combined</button>
      </div>

      <div class="searchbar">
        <input id="search" type="text" placeholder="Search any player…" autocomplete="off" />
        <button id="clear" type="button">Clear</button>
      </div>

      <div id="searchResults" aria-live="polite"></div>

      <div class="tablewrap">
        <table>
          <thead id="leaderboardHead"></thead>
          <tbody id="leaderboardBody"></tbody>
        </table>
      </div>
    </section>

    <footer>
      Created by Suity
    </footer>
  </div>

  <script src="/app.js"></script>
</body>
</html>
